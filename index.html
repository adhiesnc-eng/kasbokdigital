<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAS BOK AI - Dashboard Utama</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* Animations */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeInUp 0.6s ease-out forwards; }
        
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); }
        .hidden { display: none !important; }
        
        /* Shimmer Effect for Loading */
        .shimmer {
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

        /* Global Admin Access */
        .admin-only { display: block !important; }
        .admin-only-flex { display: flex !important; }
        .admin-only-table-cell { display: table-cell !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen is-admin">

    <!-- MAIN APP CONTENT -->
    <div id="appSection">
        <nav class="glass-nav border-b sticky top-0 z-40 px-4 py-3">
            <div class="max-w-7xl mx-auto flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="bg-blue-600 p-2 rounded-xl text-white shadow-lg shadow-blue-200">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>
                    </div>
                    <div>
                        <h1 id="appTitle" class="text-lg font-bold tracking-tight text-slate-800 leading-none uppercase">KAS BOK DIGITAL</h1>
                        <div class="flex items-center gap-1.5 text-[10px] text-slate-400 font-bold uppercase tracking-wider mt-1">
                            <span id="gsIndicator" class="w-2 h-2 bg-slate-300 rounded-full"></span>
                            <span id="gsStatusText">G-SHEET DISCONNECTED</span>
                            <span class="mx-1 text-slate-300">•</span>
                            <span id="roleBadge" class="text-blue-600 font-black uppercase">ADMINISTRATOR</span>
                        </div>
                    </div>
                </div>
                
                <div class="flex items-center gap-4">
                    <button onclick="openSettings()" class="p-2 text-slate-400 hover:text-blue-600 transition-colors" title="Pengaturan">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.72V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.17a2 2 0 0 1 1-1.74l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/></svg>
                    </button>
                    <button onclick="openModal()" class="bg-slate-900 text-white px-5 py-2.5 rounded-2xl text-sm font-bold shadow-xl active:scale-95 flex items-center gap-2">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12h14M12 5v14"/></svg>
                        Input Data
                    </button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-4 sm:p-6 space-y-6">
            <!-- Summary Dashboard -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 animate-in">
                    <p class="text-[10px] font-black text-slate-400 uppercase mb-1">Penerimaan</p>
                    <h2 id="summaryMasuk" class="text-xl font-black text-emerald-600">Rp 0</h2>
                </div>
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 animate-in">
                    <p class="text-[10px] font-black text-slate-400 uppercase mb-1">Belanja</p>
                    <h2 id="summaryKeluar" class="text-xl font-black text-rose-600">Rp 0</h2>
                </div>
                <div class="bg-blue-600 p-6 rounded-[2rem] shadow-xl text-white col-span-2 animate-in">
                    <p class="text-[10px] font-black text-blue-100 uppercase mb-1">Sisa Anggaran (Pagu: <span id="paguLabel">0</span>)</p>
                    <h2 id="summarySaldo" class="text-2xl font-black">Rp 0</h2>
                </div>
            </div>

            <!-- Chart -->
            <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 animate-in">
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-6">Analisis Arus Kas</h3>
                <div class="h-64">
                    <canvas id="mainChart"></canvas>
                </div>
            </div>

            <!-- Table -->
            <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 overflow-hidden animate-in">
                <div class="p-5 bg-slate-50/50 border-b flex justify-between items-center">
                    <h3 class="font-bold text-slate-700 text-sm uppercase tracking-tight">Riwayat Transaksi Digital</h3>
                    <div class="flex gap-2">
                        <input type="text" id="filterSearch" onkeyup="renderData()" placeholder="Cari..." class="px-4 py-2 border rounded-xl text-xs font-bold outline-none focus:ring-2 focus:ring-blue-500">
                        <button onclick="exportPDF()" class="bg-rose-600 text-white p-2 rounded-xl active:scale-95 transition-all" title="Export PDF">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                        </button>
                    </div>
                </div>
                <div class="overflow-x-auto min-h-[300px]">
                    <table id="transactionTable" class="w-full text-left text-sm border-collapse">
                        <thead>
                            <tr class="bg-slate-50 text-slate-400 font-black text-[10px] uppercase tracking-widest border-b">
                                <th class="px-6 py-4 text-center">Tgl</th>
                                <th class="px-6 py-4">Keterangan</th>
                                <th class="px-6 py-4 text-right">Masuk</th>
                                <th class="px-6 py-4 text-right">Keluar</th>
                                <th class="px-6 py-4 text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- MODAL SETTINGS -->
    <div id="modalSettings" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm hidden-modal modal-overlay hidden">
        <div class="bg-white w-full max-w-lg rounded-[2.5rem] shadow-2xl overflow-hidden modal-content">
            <div class="bg-slate-900 p-8 text-white flex justify-between items-center">
                <h3 class="text-xl font-black uppercase">Pengaturan & G-Sheet</h3>
                <button onclick="closeSettings()" class="p-2 hover:bg-white/10 rounded-full"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
            </div>
            <div class="p-8 space-y-6">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Nama Puskesmas</label>
                    <input type="text" id="setAppName" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold uppercase text-xs">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Google Apps Script URL</label>
                    <input type="text" id="setGsUrl" readonly class="w-full p-4 bg-slate-100 border border-slate-200 rounded-2xl font-mono text-[9px] text-blue-600">
                </div>
                <div class="grid grid-cols-2 gap-3 p-4 bg-emerald-50 rounded-2xl border border-emerald-100">
                    <input type="text" id="newSheetName" placeholder="NAMA SHEET BARU" class="p-3 bg-white border rounded-xl text-[10px] font-bold uppercase">
                    <button onclick="createNewSheet()" class="bg-emerald-600 text-white text-[10px] font-black rounded-xl uppercase active:scale-95 transition-all">Buat Sheet Baru</button>
                </div>
                <button onclick="saveSettings()" class="w-full py-4 bg-blue-600 text-white font-black rounded-3xl uppercase tracking-widest shadow-xl">Simpan Perubahan</button>
            </div>
        </div>
    </div>

    <!-- MODAL INPUT -->
    <div id="modalEntry" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm hidden-modal modal-overlay hidden">
        <div id="modalContainer" class="bg-white w-full max-w-2xl rounded-[3rem] shadow-2xl overflow-hidden modal-content relative">
             <div class="bg-slate-900 p-8 text-white flex justify-between items-center sticky top-0 z-10">
                <h3 class="text-xl font-black uppercase">Input Transaksi</h3>
                <button onclick="closeModal()" class="p-2 hover:bg-white/10 rounded-full"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
            </div>
            <form id="transactionForm" onsubmit="handleSave(event)" class="p-8 space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">Tanggal</label>
                        <input type="date" id="inputTgl" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">Tipe</label>
                        <select id="inputType" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold">
                            <option value="masuk">MASUK</option>
                            <option value="keluar" selected>KELUAR</option>
                        </select>
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">Keterangan SPJ</label>
                    <input type="text" id="inputKet" required placeholder="CONTOH: BELANJA ATK PROMKES" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold uppercase">
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">Nominal (Rp)</label>
                    <input type="number" id="inputJumlah" required placeholder="0" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-black text-2xl">
                </div>
                <button type="submit" class="w-full py-4 bg-blue-600 text-white font-black rounded-3xl uppercase tracking-widest shadow-xl shadow-blue-100 active:scale-95 transition-all">Simpan & Sync</button>
            </form>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 px-8 py-4 rounded-[2rem] shadow-2xl z-[100] transition-all duration-500 translate-y-20 opacity-0 bg-slate-900 text-white font-black text-xs"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Firebase Config ---
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'kas-bok-2026';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let transactions = [];
        let chartInstance = null;
        let authReady = false;

        // --- Google Sheets Config ---
        const GS_API_URL = "https://script.google.com/macros/s/AKfycbwWNkCG7k929Wd3CUIsBgI_xXFqbc9W9s5ff1-qJKCdgPVWs4Ev5x9rQRD7CHdFwjLldg/exec";

        let appConfig = {
            name: localStorage.getItem('kasBok_appName') || "KAS BOK DIGITAL",
            pagu: parseInt(localStorage.getItem('kasBok_pagu')) || 500000000,
            gsUrl: GS_API_URL,
            currentSheet: localStorage.getItem('kasBok_activeSheet') || "Main"
        };

        // --- INITIALIZATION ---
        async function startApp() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
                authReady = true;
                updateGSheetIndicator();
            } catch (error) {
                console.error("Auth Error:", error);
                showToast("GAGAL OTENTIKASI DATABASE", "error");
            }
        }

        onAuthStateChanged(auth, (user) => {
            if (user && authReady) {
                setupDataListener();
            }
        });

        window.addEventListener('DOMContentLoaded', () => {
            updateConfigUI();
            startApp();
        });

        // --- FIRESTORE LOGIC ---
        function setupDataListener() {
            if (!auth.currentUser) return;
            
            const collectionPath = `artifacts/${appId}/public/data/transactions`;
            onSnapshot(collection(db, collectionPath), 
                (snap) => {
                    transactions = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    renderData();
                    updateDashboard();
                    updateChart();
                }, 
                (error) => {
                    console.error("Firestore error:", error);
                }
            );
        }

        window.renderData = () => {
            const tbody = document.getElementById('tableBody');
            if (!tbody) return;
            const searchInput = document.getElementById('filterSearch');
            const search = searchInput ? searchInput.value.toLowerCase() : "";
            tbody.innerHTML = '';

            transactions
                .filter(t => (t.ket||'').toLowerCase().includes(search))
                .sort((a,b) => new Date(b.tgl) - new Date(a.tgl))
                .forEach(t => {
                    const row = document.createElement('tr');
                    row.className = "hover:bg-slate-50 transition-all border-b border-slate-100";
                    row.innerHTML = `
                        <td class="px-6 py-4 font-bold text-slate-500 text-[10px] text-center">${t.tgl}</td>
                        <td class="px-6 py-4 font-black uppercase text-slate-800 text-xs">${t.ket}</td>
                        <td class="px-6 py-4 text-right text-emerald-600 font-black text-xs">${t.masuk ? formatIDR(t.masuk) : '-'}</td>
                        <td class="px-6 py-4 text-right text-rose-600 font-black text-xs">${t.keluar ? formatIDR(t.keluar) : '-'}</td>
                        <td class="px-6 py-4 text-center">
                            <button onclick="deleteItem('${t.id}')" class="p-2 text-slate-300 hover:text-rose-600 transition-all">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
                            </button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
        };

        window.handleSave = async (e) => {
            e.preventDefault();
            if (!auth.currentUser) return showToast("OTENTIKASI GAGAL", "error");

            const type = document.getElementById('inputType').value;
            const amount = parseFloat(document.getElementById('inputJumlah').value);
            const payload = {
                tgl: document.getElementById('inputTgl').value,
                ket: document.getElementById('inputKet').value.toUpperCase(),
                masuk: type === 'masuk' ? amount : 0,
                keluar: type === 'keluar' ? amount : 0,
                pencatat: "ADMIN",
                createdAt: new Date().toISOString()
            };

            try {
                // 1. Simpan ke Firestore
                const colPath = `artifacts/${appId}/public/data/transactions`;
                await addDoc(collection(db, colPath), payload);
                
                // 2. Sync ke Google Sheets
                if (appConfig.gsUrl) {
                    fetch(appConfig.gsUrl, {
                        method: "POST",
                        mode: "no-cors",
                        headers: { "Content-Type": "text/plain" },
                        body: JSON.stringify({ 
                            action: "addRow", 
                            targetSheet: appConfig.currentSheet,
                            ...payload 
                        })
                    }).catch(err => console.error("GSheet error:", err));
                }

                closeModal();
                showToast("DATA DISINKRONKAN KE CLOUD & SHEET");
            } catch (err) { 
                console.error(err);
                showToast("GAGAL MENYIMPAN DATA", "error"); 
            }
        };

        window.deleteItem = async (id) => {
            if (!auth.currentUser) return;
            if(confirm("Hapus data secara permanen?")) {
                try {
                    const colPath = `artifacts/${appId}/public/data/transactions`;
                    await deleteDoc(doc(db, colPath, id));
                    showToast("DATA DIHAPUS");
                } catch (e) { showToast("GAGAL MENGHAPUS", "error"); }
            }
        };

        // --- EXPORT PDF (FIXED Scope) ---
        window.exportPDF = function() {
            if (transactions.length === 0) return showToast("TIDAK ADA DATA UNTUK DICETAK", "error");
            
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            
            doc.setFontSize(14);
            doc.text("LAPORAN REALISASI KAS BOK DIGITAL", 149, 15, { align: 'center' });
            doc.setFontSize(10);
            doc.text(`Puskesmas: ${appConfig.name} | Dicetak: ${new Date().toLocaleString('id-ID')}`, 149, 22, { align: 'center' });

            const dataTable = transactions
                .sort((a,b) => new Date(a.tgl) - new Date(b.tgl))
                .map((t, i) => [
                    i + 1,
                    t.tgl,
                    t.ket,
                    formatIDR(t.masuk || 0),
                    formatIDR(t.keluar || 0)
                ]);

            doc.autoTable({
                head: [['No', 'Tanggal', 'Keterangan / SPJ', 'Penerimaan', 'Pengeluaran']],
                body: dataTable,
                startY: 30,
                theme: 'grid',
                headStyles: { fillColor: [37, 99, 235] },
                styles: { fontSize: 8 }
            });

            doc.save(`Laporan_Kas_BOK_${appConfig.name}_${new Date().getTime()}.pdf`);
        };

        // --- SETTINGS ---
        window.openSettings = () => {
            document.getElementById('setAppName').value = appConfig.name;
            document.getElementById('setGsUrl').value = appConfig.gsUrl;
            document.getElementById('modalSettings').classList.remove('hidden');
        };

        window.closeSettings = () => document.getElementById('modalSettings').classList.add('hidden');

        window.saveSettings = () => {
            appConfig.name = document.getElementById('setAppName').value.toUpperCase();
            localStorage.setItem('kasBok_appName', appConfig.name);
            updateConfigUI();
            closeSettings();
            showToast("PENGATURAN DISIMPAN");
        };

        window.createNewSheet = async () => {
            const name = document.getElementById('newSheetName').value.trim();
            if (!name) return showToast("NAMA SHEET KOSONG", "error");
            
            showToast("MEMPROSES SHEET BARU...");
            try {
                const res = await fetch(appConfig.gsUrl, {
                    method: "POST",
                    body: JSON.stringify({ action: "createSheet", sheetName: name })
                });
                appConfig.currentSheet = name;
                localStorage.setItem('kasBok_activeSheet', name);
                showToast("SHEET BARU '" + name + "' SIAP!");
                updateGSheetIndicator();
            } catch (e) { 
                appConfig.currentSheet = name;
                localStorage.setItem('kasBok_activeSheet', name);
                showToast("PERINTAH TERKIRIM KE SHEET", "success"); 
                updateGSheetIndicator();
            }
        };

        function updateConfigUI() {
            const title = document.getElementById('appTitle');
            if(title) title.innerText = appConfig.name;
            const paguLabel = document.getElementById('paguLabel');
            if(paguLabel) paguLabel.innerText = formatIDR(appConfig.pagu);
            updateGSheetIndicator();
        }

        function updateGSheetIndicator() {
            const ind = document.getElementById('gsIndicator');
            const txt = document.getElementById('gsStatusText');
            if (appConfig.gsUrl && ind && txt) {
                ind.className = "w-2 h-2 bg-emerald-500 rounded-full animate-pulse";
                txt.innerText = "G-SHEET CONNECTED (" + appConfig.currentSheet + ")";
            }
        }

        function updateDashboard() {
            const sumKeluar = transactions.reduce((a,b) => a + (b.keluar || 0), 0);
            const sumMasuk = transactions.reduce((a,b) => a + (b.masuk || 0), 0);
            
            const m = document.getElementById('summaryMasuk'); if(m) m.innerText = formatIDR(sumMasuk);
            const k = document.getElementById('summaryKeluar'); if(k) k.innerText = formatIDR(sumKeluar);
            const s = document.getElementById('summarySaldo'); if(s) s.innerText = formatIDR(appConfig.pagu - sumKeluar);
        }

        function updateChart() {
            const ctx = document.getElementById('mainChart');
            if (!ctx) return;
            const realization = transactions.reduce((a,b) => a + (b.keluar || 0), 0);
            const budget = appConfig.pagu;

            if(chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Pagu Anggaran', 'Realisasi Belanja'],
                    datasets: [{
                        label: 'Rupiah',
                        data: [budget, realization],
                        backgroundColor: ['#e2e8f0', '#2563eb'],
                        borderRadius: 12
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, ticks: { font: { size: 10 } } } }
                }
            });
        }

        window.showToast = (msg, type='success') => {
            const t = document.getElementById('toast');
            if(!t) return;
            t.innerText = msg;
            t.className = `fixed bottom-8 left-1/2 -translate-x-1/2 px-8 py-4 rounded-[2rem] shadow-2xl z-[100] transition-all duration-500 translate-y-0 opacity-100 font-black text-xs ${type === 'error' ? 'bg-rose-600' : 'bg-slate-900'} text-white`;
            setTimeout(() => t.classList.add('translate-y-20', 'opacity-0'), 3000);
        };

        window.openModal = () => document.getElementById('modalEntry').classList.remove('hidden');
        window.closeModal = () => { document.getElementById('modalEntry').classList.add('hidden'); document.getElementById('transactionForm').reset(); document.getElementById('inputTgl').valueAsDate = new Date(); };
        const formatIDR = (n) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(n);
        document.getElementById('inputTgl').valueAsDate = new Date();
    </script>
</body>
</html>
